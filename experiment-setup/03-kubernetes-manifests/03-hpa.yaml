# HorizontalPodAutoscaler — the research subject.
#
# Matches the example in the research proposal:
#   - CPU and memory targets set to 75% (the proposal's stated values)
#   - minReplicas = 2, maxReplicas = 5
#   - No `behavior:` block — HPA defaults apply (no custom stabilization
#     window or per-step scaling policies)
#
# IMPORTANT: This configuration is fixed and unchanged throughout the
# experiment, per the proposal's Internal Validity statement
# ("Fixed HPA policy avoids tuning bias"). Do not patch the live HPA
# during the campaign.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autoscale-sample-hpa
  namespace: autoscale-research
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autoscale-sample
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
