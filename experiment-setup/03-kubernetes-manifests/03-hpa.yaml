# HorizontalPodAutoscaler — the research subject.
#
# Post-pilot configuration for the 80-run campaign:
#   - CPU and memory targets set to 75% (moderate sensitivity)
#   - minReplicas = 2   (idle baseline)
#   - maxReplicas = 10  (broad range so all 4 correctness buckets can be
#                        observed: Correct, Correct-but-Late, Ineffective
#                        via ceiling saturation, Unnecessary)
#   - No `behavior:` block — HPA defaults apply (no custom stabilization
#     window or per-step scaling policies)
#
# Sizing rationale:
#   - Node has 4 vCPU allocatable = 4000m
#   - System overhead (Prometheus, Grafana, k3s, watcher) ~ 700m
#   - maxReplicas × 200m pod limit = 2000m at max
#   - Total at max HPA: ~2700m of 4000m = 68% node CPU committed
#   - Leaves comfortable headroom for OS + burst overhead
#
# IMPORTANT: This configuration is fixed once the campaign starts.
# Do not patch the live HPA between runs — that would introduce a
# tuning-bias confound and invalidate the correctness comparison across
# workload patterns.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autoscale-sample-hpa
  namespace: autoscale-research
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autoscale-sample
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
