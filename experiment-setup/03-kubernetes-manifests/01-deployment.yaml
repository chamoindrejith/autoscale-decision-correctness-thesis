# Deployment = "keep N replicas of this pod alive, always".
# The HPA modifies `spec.replicas` on this object to scale up/down.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscale-sample
  namespace: autoscale-research
  labels:
    app: autoscale-sample
spec:
  replicas: 2                    # starting replicas; HPA will override this
  selector:
    matchLabels:
      app: autoscale-sample
  template:
    metadata:
      labels:
        app: autoscale-sample
    spec:
      containers:
        - name: app
          image: autoscale-sample:v1
          imagePullPolicy: Never         # use locally-imported image (no registry)
          ports:
            - name: http
              containerPort: 9000
            - name: metrics
              containerPort: 9797
          # --- Resource requests/limits ---
          # The HPA computes CPU% as (actual CPU) / (requested CPU).
          # requests == limits intentionally: when they are equal, the
          # HPA's reported CPU% is bounded to 0–100% and reflects true
          # capacity utilisation. Decoupling requests from limits would
          # let pods burst beyond their request, producing CPU readings
          # above 100% that conflate pod-level bursting with HPA's view.
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"   # raised from 256Mi — the earlier value was
                                 # within 20% of Ballerina JVM's warm working
                                 # set (baseline ~115 MB idle, ~250-400 MB
                                 # under sustained load with JIT). 512 Mi
                                 # gives ~2× headroom over observed peak.
            limits:
              cpu: "200m"
              memory: "512Mi"
          # --- Probes ---
          # Both probes are DELIBERATELY LENIENT because the pod is
          # deliberately CPU-saturated during bursts, and requests==limits
          # means the pod has zero CPU headroom for health-endpoint
          # responsiveness. The JIT calibration Run 1 showed that even
          # timeoutSeconds:5 on liveness was insufficient — pods restarted
          # mid-burst because /api/health couldn't respond fast enough while
          # /api/compute pinned all 200m of CPU. Values below give each probe
          # generous time and tolerate multiple consecutive failures.
          #
          # startupProbe added post-audit: without it, the liveness probe
          # fires 15 s after container start. If the Ballerina JVM's warm-up
          # runs past 15 s under CPU pressure, the failure counter starts
          # against a still-warming pod. startupProbe defers liveness until
          # the container signals it's ready — up to 60 s (10 × 6 s) —
          # eliminating a documented silent-restart failure mode.
          startupProbe:
            httpGet:
              path: /api/health
              port: 9000
            periodSeconds: 6
            timeoutSeconds: 5
            failureThreshold: 10   # allows up to 60 s for JVM warm-up
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
