# Deployment = "keep N replicas of this pod alive, always".
# The HPA modifies `spec.replicas` on this object to scale up/down.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscale-sample
  namespace: autoscale-research
  labels:
    app: autoscale-sample
spec:
  replicas: 2                    # starting replicas; HPA will override this
  selector:
    matchLabels:
      app: autoscale-sample
  template:
    metadata:
      labels:
        app: autoscale-sample
    spec:
      containers:
        - name: app
          image: autoscale-sample:v1
          imagePullPolicy: Never         # use locally-imported image (no registry)
          ports:
            - name: http
              containerPort: 9000
            - name: metrics
              containerPort: 9797
          # --- Resource requests/limits ---
          # The HPA computes CPU% as (actual CPU) / (requested CPU).
          # requests == limits intentionally: when they are equal, the
          # HPA's reported CPU% is bounded to 0–100% and reflects true
          # capacity utilisation. Decoupling requests from limits would
          # let pods burst beyond their request, producing CPU readings
          # above 100% that conflate pod-level bursting with HPA's view.
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          # --- Probes ---
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 3
          # Liveness probe is intentionally lenient because the pod is
          # deliberately CPU-saturated during bursts. The default 1-second
          # timeout caused false-positive restarts during the burst pilot
          # (both original pods restarted mid-burst), which would corrupt
          # HPA correctness data by resetting CPU history and confusing
          # replica tracking. Values below give the health endpoint 5s per
          # check and require ~30s of missed checks before restart.
          livenessProbe:
            httpGet:
              path: /api/health
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
