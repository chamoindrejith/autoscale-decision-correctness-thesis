# Helm values for kube-prometheus-stack.
# Tuned for a small (4 GB RAM) single-node k3s Droplet.

prometheus:
  prometheusSpec:
    # How long to keep scraped data. Post-audit: raised from 3d to 14d so
    # the campaign's HPA + CPU time-series remain queryable for two weeks
    # after the campaign ends. Additional disk cost at 5s scrape interval
    # is a few GiB — well within budget.
    retention: 14d

    # Resource budget. Node has 8 GiB total; we can afford to give
    # Prometheus real headroom rather than the pilot's tight 1Gi.
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

    # Persistent storage via PVC so Prometheus data survives pod restarts.
    # Post-audit: previous `storageSpec: {}` used emptyDir, which lost all
    # historical scrape data on any pod restart — a single-point-of-failure
    # for the 35-hour campaign. Uses k3s's default local-path StorageClass
    # (same one the HPA watcher's PVC uses).
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          storageClassName: local-path
          resources:
            requests:
              storage: 15Gi

    # IMPORTANT: this selector tells Prometheus which ServiceMonitors to pick
    # up. Empty selector = all of them, in all namespaces. Matches our
    # ServiceMonitor label `release: kube-prometheus-stack`.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

grafana:
  # Default admin password. Change in production; fine for research.
  adminPassword: ""

  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

  # Grafana loads a ton of default dashboards. Keep them — they're useful.
  defaultDashboardsEnabled: true

alertmanager:
  # We don't need alerts for this experiment; disable to save RAM.
  enabled: false

# These are cluster-wide exporters included with kube-prometheus-stack.
# Keep them — they give us node CPU/memory metrics and k8s object metrics.
kube-state-metrics:
  resources:
    requests:
      cpu: "20m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

prometheus-node-exporter:
  resources:
    requests:
      cpu: "20m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"
