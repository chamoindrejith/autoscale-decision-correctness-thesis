# Runtime configuration for the Ballerina app.
# This file is read at startup.

# ---------------------------------------------------------------------------
# App-level config
# ---------------------------------------------------------------------------
[research.autoscale_test]
# Default "work size" per request when caller doesn't specify iterations.
# Tune so a single request takes ~30-80ms of CPU on your Droplet.
defaultIterations = 500000

# ---------------------------------------------------------------------------
# Ballerina observability — enables the built-in Prometheus reporter.
# Together with `observabilityIncluded = true` in Ballerina.toml (which
# compiles the reporter into the JAR), these settings cause the JAR to
# start an HTTP server serving /metrics in Prometheus text-exposition
# format. The reporter defaults to port 9797 on 0.0.0.0, which matches
# the `metrics` port exposed in 03-kubernetes-manifests/02-service.yaml
# and scraped by 04-servicemonitor.yaml.
#
# Note: earlier attempts to specify [ballerinaobsprometheus] port/host
# caused the app to crash-loop on Ballerina 2201.10 with "unused
# configuration value" errors. That section name is not valid in this
# Ballerina distribution — the reporter binds to the defaults instead.
# ---------------------------------------------------------------------------
[ballerina.observe]
metricsEnabled = true
metricsReporter = "prometheus"
