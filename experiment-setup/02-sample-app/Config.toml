# Runtime configuration for the Ballerina app.
# This file is read at startup.

# ---------------------------------------------------------------------------
# App-level config
# ---------------------------------------------------------------------------
[research.autoscale_test]
# Default "work size" per request when caller doesn't specify iterations.
# Tune so a single request takes ~30-80ms of CPU on your Droplet.
defaultIterations = 500000

# ---------------------------------------------------------------------------
# Ballerina observability — enables the built-in Prometheus reporter.
# Together with `observabilityIncluded = true` in Ballerina.toml (which
# compiles the reporter into the JAR), these settings cause the JAR to
# start an HTTP server on the configured port serving /metrics in
# Prometheus text-exposition format.
#
# Metrics are consumed by the kube-prometheus-stack Prometheus, discovered
# via the ServiceMonitor at experiment-setup/03-kubernetes-manifests/
# 04-servicemonitor.yaml, and visualised in the "Request latency" and
# "Throughput" panels of the Grafana dashboard.
# ---------------------------------------------------------------------------
[ballerina.observe]
metricsEnabled = true
metricsReporter = "prometheus"

[ballerinaobsprometheus]
port = 9797
host = "0.0.0.0"
