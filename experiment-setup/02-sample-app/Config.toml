# Runtime configuration for the Ballerina app.
# This file is read at startup.

# ---------------------------------------------------------------------------
# App-level config
# ---------------------------------------------------------------------------
[research.autoscale_test]
# Default "work size" per request when caller doesn't specify iterations.
# Tune so a single request takes ~30-80ms of CPU on your Droplet.
defaultIterations = 500000

# ---------------------------------------------------------------------------
# Ballerina observability
# ---------------------------------------------------------------------------
# STATUS: Prometheus scraping of the Ballerina app was ATTEMPTED but not
# deployed in the campaign. Multiple Config.toml syntaxes were tried on
# Ballerina 2201.10:
#
#   * [ballerinaobsprometheus] port=... host=...      → crash-loops
#     (unused configuration value)
#   * [ballerina.observe] metricsEnabled=true         → accepted, but
#         metricsReporter="prometheus"                    reporter never
#                                                        starts (only port
#                                                        9000 listens)
#   * adding enabled=true to the block                → crash-loops
#
# The correct TOML section names for this Ballerina release are not
# documented consistently across Ballerina versions. Since the primary
# latency source for the SES / SRD analysis is k6's http_req_duration
# (a well-established client-side measurement), server-side Ballerina
# metrics were dropped from scope for the campaign.
#
# The "Request latency" and "Throughput" panels of the Grafana dashboard
# therefore stay empty during runs; k6 JSON outputs (in results/) carry
# all the latency data the analysis pipeline needs.
# ---------------------------------------------------------------------------
